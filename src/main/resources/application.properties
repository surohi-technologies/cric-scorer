spring.application.name=cric-scorer
spring.datasource.url=jdbc:postgresql://localhost:5432/cric_scorer
spring.datasource.username=postgres
spring.datasource.password=admin

# Optional: Hibernate JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway (SQL migrations)
spring.flyway.enabled=true
# If your schema already has tables created earlier, allow Flyway to start managing it
# without skipping our V1/V2 migrations.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Session (inactivity-based). Default is 60s; override via env var APP_SESSION_IDLE_TIMEOUT_SECONDS.
app.session.idle-timeout-seconds=60

# How often the backend should sweep and mark idle sessions inactive (milliseconds).
# Override via env var APP_SESSION_CLEANUP_INTERVAL_MS.
app.session.cleanup-interval-ms=30000

# OTP + Reset
app.registration.require-both-channels=true
app.otp.expiry-seconds=300
app.otp.max-attempts=5
app.otp.pepper=cric-scorer
# Dev helper: logs OTP in backend console so you can test without SMS/email provider.
app.otp.dev-log=true
# Dev default OTP (6 digits). Set empty to go back to random OTP.
app.otp.fixed-otp=123456

app.reset-token.expiry-seconds=600
server.port = 2032

